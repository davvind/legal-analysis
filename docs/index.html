<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Analysis</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a2f45;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.12);
    --text: #e2e4ec;
    --text-muted: #7a8099;
    --green: #3ecf8e;
    --red: #f87171;
    --user-bubble: #1e2b45;
    --assistant-bubble: #1a2235;
    --radius: 6px;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font-sans: 'Inter', system-ui, sans-serif;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: auto 1fr;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header .logo {
    font-size: 11px;
    font-family: var(--font-mono);
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 600;
  }
  header .sep { flex: 1; }
  header .build-tag {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 3px;
  }

  /* ── Sidebar ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-label {
    font-size: 10px;
    font-family: var(--font-mono);
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label { font-size: 12px; color: var(--text-muted); }
  input[type="text"], input[type="file"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    font-family: var(--font-sans);
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="file"] { padding: 6px 8px; cursor: pointer; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 14px;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
    font-weight: 500;
  }
  .btn:hover { opacity: 0.88; }
  .btn-primary { background: var(--accent); color: #0f1117; width: 100%; }
  .btn-ghost {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    flex: 1;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--red);
    flex: 1;
  }
  .btn-danger:hover { border-color: var(--red); background: rgba(248,113,113,0.08); }

  .status-msg {
    font-size: 12px;
    padding: 8px 10px;
    border-radius: var(--radius);
    margin-top: 8px;
    display: none;
  }
  .status-msg.ok { background: rgba(62,207,142,0.12); color: var(--green); border: 1px solid rgba(62,207,142,0.25); display: block; }
  .status-msg.feil { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.25); display: block; }
  .status-msg.venter { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); display: block; }

  hr.divider { border: none; border-top: 1px solid var(--border); }

  /* ── Main chat area ── */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .chat-toolbar .session-label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    flex: 1;
  }

  #chatLogg {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-tom {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--text-muted);
  }
  .chat-tom .ikon { font-size: 32px; opacity: 0.4; }
  .chat-tom p { font-size: 13px; text-align: center; max-width: 300px; line-height: 1.6; }

  .melding {
    display: flex;
    flex-direction: column;
    max-width: 760px;
  }
  .melding.bruker { align-self: flex-end; align-items: flex-end; }
  .melding.assistent { align-self: flex-start; align-items: flex-start; }

  .melding-meta {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.06em;
  }

  .boble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bruker .boble {
    background: var(--user-bubble);
    border: 1px solid #253550;
    color: var(--text);
    border-bottom-right-radius: 2px;
  }
  .assistent .boble {
    background: var(--assistant-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 2px;
  }
  .assistent .boble .kilde-info {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
  }

  .typing-indikator {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: var(--assistant-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: fit-content;
  }
  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: blink 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── Input bar ── */
  .input-bar {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #chatInput {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: var(--font-sans);
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  #chatInput:focus { border-color: var(--accent); }
  #chatInput::placeholder { color: var(--text-muted); }
  .send-btn {
    background: var(--accent);
    color: #0f1117;
    border: none;
    border-radius: var(--radius);
    width: 42px;
    height: 42px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <span class="logo">⚖ Legal Analysis</span>
  <span class="sep"></span>
  <span class="build-tag" id="headerStatus">Klar</span>
</header>

<!-- Sidebar -->
<aside>

  <div>
    <div class="panel-label">Last opp dokument</div>
    <div class="field-group">
      <label>PDF-fil</label>
      <input type="file" id="fil" accept=".pdf">
    </div>
    <div class="field-group" style="margin-top:10px">
      <label>Dokumenttype</label>
      <select id="doctype">
        <option value="vitneavhor">Vitneavhør</option>
        <option value="domsavsigelse">Domsavsigelse</option>
        <option value="politirapport">Politirapport</option>
        <option value="rettsbok">Rettsbok</option>
        <option value="brev">Brev/korrespondanse</option>
        <option value="ukjent">Annet</option>
      </select>
    </div>
    <div class="field-group" style="margin-top:10px">
      <label>Person/vitne (valgfritt)</label>
      <input type="text" id="person" placeholder="F.eks. Per Orderud">
    </div>
    <div class="field-group" style="margin-top:10px">
      <label>Dato (valgfritt)</label>
      <input type="text" id="dato" placeholder="F.eks. 1999-05-22">
    </div>
    <button class="btn btn-primary" style="margin-top:14px" onclick="lastOpp()">Last opp og indekser</button>
    <div id="opplastingStatus" class="status-msg"></div>
  </div>

  <hr class="divider">

  <div>
    <div class="panel-label">Søkeinnstillinger</div>
    <div class="field-group">
      <label>Type analyse</label>
      <select id="analysetype">
        <option value="general">Generell analyse</option>
        <option value="motsetninger">Motstridende forklaringer</option>
        <option value="tidslinje">Tidslinje-konsistens</option>
        <option value="selvmotsigelser">Selvmotsigelser</option>
      </select>
    </div>
    <div class="field-group" style="margin-top:10px">
      <label>Filtrer på person</label>
      <input type="text" id="filterPerson" placeholder="Kun om denne personen">
    </div>
    <div class="field-group" style="margin-top:10px">
      <label>Filtrer på dokumenttype</label>
      <select id="filterDoctype">
        <option value="">Alle dokumenttyper</option>
        <option value="vitneavhor">Vitneavhør</option>
        <option value="domsavsigelse">Domsavsigelse</option>
        <option value="politirapport">Politirapport</option>
        <option value="rettsbok">Rettsbok</option>
        <option value="brev">Brev/korrespondanse</option>
      </select>
    </div>
  </div>

  <hr class="divider">

  <div>
    <div class="panel-label">Økt</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="lagreOkt()" title="Last ned samtalen som tekstfil">↓ Lagre</button>
      <button class="btn btn-ghost" onclick="document.getElementById('lastInnFil').click()" title="Last opp en lagret økt">↑ Last inn</button>
      <button class="btn btn-danger" onclick="nyOkt()" title="Slett historikk og start på nytt">✕ Ny økt</button>
      <input type="file" id="lastInnFil" accept=".json,.txt" style="display:none" onchange="lastInnOkt(event)">
    </div>
  </div>

</aside>

<!-- Main -->
<main>
  <div class="chat-toolbar">
    <span class="session-label" id="sessionLabel">Ny økt — ingen meldinger ennå</span>
  </div>

  <div id="chatLogg">
    <div class="chat-tom" id="tomPlassholder">
      <div class="ikon">⚖</div>
      <p>Still et spørsmål om kildematerialet. Samtalehistorikken bevares slik at oppfølgingsspørsmål fungerer naturlig.</p>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="chatInput" rows="1" placeholder="Spørsmål om dokumentene…" onkeydown="handleKeydown(event)" oninput="autoresize(this)"></textarea>
    <button class="send-btn" id="sendKnapp" onclick="sendMelding()">↑</button>
  </div>
</main>

<script>
const API = "https://legal-analysis-production-8792.up.railway.app";
let historikk = []; // { role: "user"|"assistant", content: string }
let venterPaSvar = false;

// ── Hjelp ──

function autoresize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 140) + "px";
}

function handleKeydown(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMelding();
  }
}

function oppdaterSessionLabel() {
  const label = document.getElementById("sessionLabel");
  if (historikk.length === 0) {
    label.textContent = "Ny økt — ingen meldinger ennå";
  } else {
    const antall = historikk.filter(m => m.role === "user").length;
    label.textContent = `${antall} spørsmål i denne økten`;
  }
}

function skjulTomPlassholder() {
  const el = document.getElementById("tomPlassholder");
  if (el) el.remove();
}

function leggTilMelding(role, content, kilderBrukt = null) {
  skjulTomPlassholder();
  const logg = document.getElementById("chatLogg");

  const wrap = document.createElement("div");
  wrap.className = `melding ${role === "user" ? "bruker" : "assistent"}`;

  const meta = document.createElement("div");
  meta.className = "melding-meta";
  meta.textContent = role === "user" ? "DU" : "ANALYSE";
  wrap.appendChild(meta);

  const boble = document.createElement("div");
  boble.className = "boble";
  boble.textContent = content;

  if (role === "assistant" && kilderBrukt !== null) {
    const kilde = document.createElement("div");
    kilde.className = "kilde-info";
    kilde.textContent = `${kilderBrukt} dokumentbiter søkt`;
    boble.appendChild(kilde);
  }

  wrap.appendChild(boble);
  logg.appendChild(wrap);
  logg.scrollTop = logg.scrollHeight;
  oppdaterSessionLabel();
}

function visTypingIndikator() {
  const logg = document.getElementById("chatLogg");
  const wrap = document.createElement("div");
  wrap.className = "melding assistent";
  wrap.id = "typingIndikator";

  const meta = document.createElement("div");
  meta.className = "melding-meta";
  meta.textContent = "ANALYSE";
  wrap.appendChild(meta);

  const ind = document.createElement("div");
  ind.className = "typing-indikator";
  ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  wrap.appendChild(ind);

  logg.appendChild(wrap);
  logg.scrollTop = logg.scrollHeight;
}

function fjernTypingIndikator() {
  const el = document.getElementById("typingIndikator");
  if (el) el.remove();
}

function settHeaderStatus(tekst) {
  document.getElementById("headerStatus").textContent = tekst;
}

// ── Send melding ──

async function sendMelding() {
  if (venterPaSvar) return;

  const input = document.getElementById("chatInput");
  const tekst = input.value.trim();
  if (!tekst) return;

  input.value = "";
  autoresize(input);
  document.getElementById("sendKnapp").disabled = true;
  venterPaSvar = true;
  settHeaderStatus("Analyserer…");

  // Legg til brukermelding i UI og historikk
  historikk.push({ role: "user", content: tekst });
  leggTilMelding("user", tekst);

  visTypingIndikator();

  try {
    const svar = await fetch(`${API}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: historikk,
        analyse_type: document.getElementById("analysetype").value,
        filter_person: document.getElementById("filterPerson").value,
        filter_doctype: document.getElementById("filterDoctype").value
      })
    });

    const data = await svar.json();
    fjernTypingIndikator();

    if (data.svar) {
      historikk.push({ role: "assistant", content: data.svar });
      leggTilMelding("assistant", data.svar, data.kilder_brukt);
      settHeaderStatus("Klar");
    } else {
      leggTilMelding("assistant", `Feil fra server: ${JSON.stringify(data)}`);
      settHeaderStatus("Feil");
      historikk.pop(); // fjern den feilede brukermeldingen
    }
  } catch(e) {
    fjernTypingIndikator();
    leggTilMelding("assistant", `Nettverksfeil: ${e.message}`);
    settHeaderStatus("Feil");
    historikk.pop();
  }

  venterPaSvar = false;
  document.getElementById("sendKnapp").disabled = false;
}

// ── Økt-håndtering ──

function nyOkt() {
  if (historikk.length > 0 && !confirm("Slette hele samtalehistorikken?")) return;
  historikk = [];
  const logg = document.getElementById("chatLogg");
  logg.innerHTML = `<div class="chat-tom" id="tomPlassholder">
    <div class="ikon">⚖</div>
    <p>Still et spørsmål om kildematerialet. Samtalehistorikken bevares slik at oppfølgingsspørsmål fungerer naturlig.</p>
  </div>`;
  oppdaterSessionLabel();
  settHeaderStatus("Klar");
}

function lagreOkt() {
  if (historikk.length === 0) { alert("Ingen samtale å lagre ennå."); return; }

  const ts = new Date().toISOString().slice(0, 16).replace("T", "_").replace(":", "-");
  const eksport = {
    eksportert: new Date().toISOString(),
    analyse_type: document.getElementById("analysetype").value,
    filter_person: document.getElementById("filterPerson").value,
    filter_doctype: document.getElementById("filterDoctype").value,
    meldinger: historikk
  };

  const blob = new Blob([JSON.stringify(eksport, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `legal-analyse-${ts}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function lastInnOkt(event) {
  const fil = event.target.files[0];
  if (!fil) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.meldinger || !Array.isArray(data.meldinger)) {
        alert("Ugyldig økt-fil: mangler 'meldinger'-felt.");
        return;
      }

      if (historikk.length > 0 && !confirm("Erstatte gjeldende samtale med den lagrede økten?")) return;

      // Sett filterinnstillinger fra filen hvis de finnes
      if (data.analyse_type) document.getElementById("analysetype").value = data.analyse_type;
      if (data.filter_person !== undefined) document.getElementById("filterPerson").value = data.filter_person;
      if (data.filter_doctype !== undefined) document.getElementById("filterDoctype").value = data.filter_doctype;

      // Gjenoppbygg historikk og UI
      historikk = data.meldinger;
      const logg = document.getElementById("chatLogg");
      logg.innerHTML = "";

      for (const m of historikk) {
        leggTilMelding(m.role, m.content);
      }

      settHeaderStatus("Økt lastet inn");
      oppdaterSessionLabel();
    } catch(err) {
      alert(`Kunne ikke lese filen: ${err.message}`);
    }
  };
  reader.readAsText(fil);
  event.target.value = ""; // reset slik at samme fil kan lastes inn på nytt
}

// ── Opplasting (uendret logikk) ──

async function lastOpp() {
  const fil = document.getElementById("fil").files[0];
  if (!fil) { alert("Velg en PDF-fil først"); return; }
  
  const statusDiv = document.getElementById("opplastingStatus");
  statusDiv.className = "status-msg venter";
  statusDiv.textContent = "⏳ Laster opp og indekserer — kan ta flere minutter for store filer…";
  settHeaderStatus("Laster opp…");

  const form = new FormData();
  form.append("file", fil);
  form.append("doc_type", document.getElementById("doctype").value);
  form.append("person", document.getElementById("person").value);
  form.append("dato", document.getElementById("dato").value);

  try {
    const svar = await fetch(`${API}/upload`, { method: "POST", body: form });
    const data = await svar.json();
    statusDiv.className = "status-msg ok";
    statusDiv.textContent = `✓ ${data.chunks_indexed} biter indeksert fra "${data.filename}"`;
    settHeaderStatus("Klar");
  } catch(e) {
    statusDiv.className = "status-msg feil";
    statusDiv.textContent = `✗ Feil: ${e.message}`;
    settHeaderStatus("Feil");
  }
}
</script>
</body>
</html>
